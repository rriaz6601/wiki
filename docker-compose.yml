services:
  site:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - dokploy-network
    labels:
      - traefik.http.middlewares.wiki-auth.forwardauth.address=http://172.17.0.1:9000/outpost.goauthentik.io/auth/traefik
      - traefik.http.middlewares.wiki-auth.forwardauth.trustForwardHeader=true
      - traefik.http.middlewares.wiki-auth.forwardauth.authResponseHeaders=X-authentik-username,X-authentik-groups,X-authentik-email,X-authentik-name,X-authentik-uid
      - traefik.http.routers.wiki-rana-jpw4dx-1-websecure.rule=Host(`wiki-ranariaz.duckdns.org`) && !PathPrefix(`/outpost.goauthentik.io`)
      - traefik.http.routers.wiki-rana-jpw4dx-1-websecure.middlewares=wiki-auth

networks:
  dokploy-network:
    external: true
