services:
  wiki-db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - wiki_db_data:/var/lib/mysql
    networks:
      - wiki

  wiki:
    image: lscr.io/linuxserver/bookstack:latest
    restart: unless-stopped
    depends_on:
      - wiki-db
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      APP_URL: ${APP_URL}
      APP_NAME: ${APP_NAME}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_DATABASE: ${DB_DATABASE}
      APP_KEY: ${APP_KEY}
    volumes:
      - wiki_app_data:/config
    networks:
      - wiki
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.wiki-web.rule=Host(`ranariaz.duckdns.org`) && PathPrefix(`/wiki`)
      - traefik.http.routers.wiki-web.entrypoints=web
      - traefik.http.routers.wiki-web.middlewares=wiki-https
      - traefik.http.routers.wiki-web.priority=200
      - traefik.http.middlewares.wiki-https.redirectscheme.scheme=https
      - traefik.http.routers.wiki.rule=Host(`ranariaz.duckdns.org`) && PathPrefix(`/wiki`)
      - traefik.http.routers.wiki.entrypoints=websecure
      - traefik.http.routers.wiki.tls=true
      - traefik.http.routers.wiki.tls.certresolver=letsencrypt
      - traefik.http.routers.wiki.priority=200
      - traefik.http.routers.wiki.middlewares=wiki-strip
      - traefik.http.middlewares.wiki-strip.stripprefix.prefixes=/wiki
      - traefik.http.services.wiki.loadbalancer.server.port=80

volumes:
  wiki_db_data:
  wiki_app_data:

networks:
  dokploy-network:
    external: true
  wiki:
    driver: bridge
